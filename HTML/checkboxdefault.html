<!DOCTYPE html>
<html>
<head>
    <title>Mobile Selection</title>

        .mobile-list {
            border: 1px solid gray;
            padding: 15px;
            width: 250px;
        }
    </style>
</head>
<body>

    <h2>Select Mobile Phones</h2>

    <div class="mobile-list">

        <label>

        <label>
            <input type="checkbox"> Samsung
        </label>
        <br><br>

        <label>
            <input type="checkbox"> iPhone
        </label>
        <br><br>

        <label>
            <input type="checkbox"> OnePlus
        </label>

    </div>

</body>
</html>
