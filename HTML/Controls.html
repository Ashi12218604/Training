<!DOCTYPE html>
<html>
<head>
    <title>Form Controls Example</title>
    <style>
        .section {
            border: 1px solid gray;
            padding: 15px;
            margin: 15px;
            width: 300px;
        }
    </style>
</head>
<body>

    <h2>Control Set 1</h2>
    <div class="section">
        <label>
            <input type="checkbox"> Accept Terms
        </label>
        <br><br>

        <label>Comments:</label><br>
        <textarea rows="3" cols="30"></textarea>
        <br><br>

        <label>Select Country:</label><br>
        <select>
            <option>India</option>
            <option>USA</option>
            <option>UK</option>
        </select>
    </div>

    <h2>Control Set 2</h2>
    <div class="section">
        <label>
            <input type="checkbox"> Subscribe Newsletter
        </label>
        <br><br>

        <label>Feedback:</label><br>
        <textarea rows="3" cols="30"></textarea>
        <br><br>

        <label>Select Course:</label><br>
        <select>
            <option>HTML</option>
            <option>CSS</option>
            <option>JavaScript</option>
        </select>
    </div>

    <h2>Control Set 3</h2>
    <div class="section">
        <label>
            <input type="checkbox"> Enable Notifications
        </label>
        <br><br>

        <label>Description:</label><br>
        <textarea rows="3" cols="30"></textarea>
        <br><br>

        <label>Select Department:</label><br>
        <select>
            <option>HR</option>
            <option>Finance</option>
            <option>IT</option>
        </select>
    </div>

</body>
</html>
